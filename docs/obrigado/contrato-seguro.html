<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Download — Contrato de Locação — Seguro Fiança</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --ink: #1a1a1a;
    --paper: #f7f4ef;
    --gold: #b8922a;
    --gold-light: #d4aa4a;
    --muted: #7a7570;
    --border: #ddd8d0;
    --error: #8b2e2e;
    --success: #2e5c3e;
  }

  html, body {
    min-height: 100vh;
    background: var(--paper);
    color: var(--ink);
    font-family: 'Jost', sans-serif;
    font-weight: 300;
  }

  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem 1.5rem;
    background-image:
      radial-gradient(ellipse at 20% 20%, rgba(184,146,42,0.06) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 80%, rgba(184,146,42,0.04) 0%, transparent 60%);
  }

  .card {
    width: 100%;
    max-width: 480px;
    background: #fff;
    border: 1px solid var(--border);
    padding: 3rem 2.5rem;
    position: relative;
    box-shadow: 0 2px 40px rgba(0,0,0,0.06), 0 1px 4px rgba(0,0,0,0.04);
  }

  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, var(--gold), var(--gold-light), var(--gold));
  }

  .icon {
    font-size: 2rem;
    margin-bottom: 1.25rem;
    display: block;
    opacity: 0.85;
  }

  .label {
    font-family: 'Jost', sans-serif;
    font-size: 0.65rem;
    font-weight: 500;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 0.5rem;
  }

  h1 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.6rem;
    font-weight: 300;
    line-height: 1.3;
    color: var(--ink);
    margin-bottom: 0.5rem;
  }

  .subtitle {
    font-size: 0.82rem;
    color: var(--muted);
    line-height: 1.6;
    margin-bottom: 2rem;
  }

  .divider {
    border: none;
    border-top: 1px solid var(--border);
    margin: 1.75rem 0;
  }

  .field-label {
    font-size: 0.72rem;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 0.5rem;
    display: block;
  }

  .input-row {
    display: flex;
    gap: 0;
  }

  input[type="text"] {
    flex: 1;
    padding: 0.75rem 1rem;
    border: 1px solid var(--border);
    border-right: none;
    background: var(--paper);
    font-family: 'Jost', sans-serif;
    font-size: 0.9rem;
    font-weight: 400;
    color: var(--ink);
    outline: none;
    transition: border-color 0.2s;
    letter-spacing: 0.05em;
  }

  input[type="text"]:focus {
    border-color: var(--gold);
    background: #fff;
  }

  button {
    padding: 0.75rem 1.25rem;
    background: var(--ink);
    color: #fff;
    border: 1px solid var(--ink);
    font-family: 'Jost', sans-serif;
    font-size: 0.75rem;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    cursor: pointer;
    transition: background 0.2s, border-color 0.2s;
    white-space: nowrap;
  }

  button:hover {
    background: var(--gold);
    border-color: var(--gold);
  }

  .msg {
    font-size: 0.78rem;
    margin-top: 0.6rem;
    min-height: 1.2em;
    transition: opacity 0.3s;
  }

  .msg.error { color: var(--error); }
  .msg.ok { color: var(--success); }

  .download-area {
    display: none;
    margin-top: 1.75rem;
    padding: 1.25rem 1.5rem;
    background: #f0f7f3;
    border: 1px solid #c5ddd0;
    animation: fadeIn 0.4s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .download-area p {
    font-size: 0.8rem;
    color: var(--success);
    margin-bottom: 1rem;
    font-weight: 400;
  }

  .download-btn {
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    padding: 0.75rem 1.5rem;
    background: var(--success);
    color: #fff;
    border: none;
    font-family: 'Jost', sans-serif;
    font-size: 0.78rem;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    text-decoration: none;
    cursor: pointer;
    transition: opacity 0.2s;
  }

  .download-btn:hover { opacity: 0.85; }

  .footer {
    margin-top: 2rem;
    font-size: 0.72rem;
    color: var(--muted);
    text-align: center;
    line-height: 1.7;
  }
</style>
</head>
<body>

<div class="card">
  <span class="icon">📄</span>
  <p class="label">Compra confirmada</p>
  <h1>Contrato de Locação — Seguro Fiança</h1>
  <p class="subtitle">Insira a senha enviada por e-mail para liberar o seu download.</p>

  <hr class="divider">

  <label class="field-label" for="pwd">Senha de acesso</label>
  <div class="input-row">
    <input type="text" id="pwd" placeholder="Digite a senha…" autocomplete="off" autocorrect="off" spellcheck="false">
    <button onclick="verificar()">Acessar</button>
  </div>
  <p class="msg" id="msg"></p>

  <div class="download-area" id="download-area">
    <p>✓ Senha correta. Seu arquivo está pronto.</p>
    <a class="download-btn" href="../../downloads/contrato-seguro.docx" download>
      ↓ &nbsp;Baixar arquivo
    </a>
  </div>
</div>

<p class="footer">
  Dúvidas? Entre em contato pelo e-mail de suporte.<br>
  Este link é de uso pessoal e intransferível.
</p>

<script>
  const SENHA = 'Cont@Seg';

  function verificar() {
    const input = document.getElementById('pwd').value.trim();
    const msg = document.getElementById('msg');
    const area = document.getElementById('download-area');

    if (input === SENHA) {
      msg.textContent = '';
      area.style.display = 'block';
      document.getElementById('pwd').style.borderColor = '#c5ddd0';
    } else {
      msg.className = 'msg error';
      msg.textContent = 'Senha incorreta. Verifique o e-mail de confirmação.';
      area.style.display = 'none';
    }
  }

  document.getElementById('pwd').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') verificar();
  });
</script>

</body>
</html>
